<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auditorias de Segurança Alimentar</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-datalabels/2.1.0/chartjs-plugin-datalabels.min.js"></script>
<style>
:root {
  --ink: #000000;
  --ink-2: #1a1a1a;
  --ink-3: #333333;
  --ink-4: #555555;
  --paper: #ffffff;
  --paper-2: #f8f9fa;
  --paper-3: #f1f3f5;
  --line: #d1d1d1;
  --line-2: #b1b1b1;
  --n1: #ff2222; --n1-bg: #fff2f2;
  --n2: #ff7b00; --n2-bg: #fff3e6;
  --n3: #ffcc00; --n3-bg: #fffbe6;
  --n4: #70AD47; --n4-bg: #f0f8ea;
  --bar-green: #70AD47;
  --bar-red: #ff2222;
  --bar-track: #e4e4e8;
  --btn-border: #b1b1b1;
  --btn-text: #222;
  --shadow: 0 1px 4px rgba(0,0,0,.06), 0 2px 12px rgba(0,0,0,.04);
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--paper);
  color: var(--ink);
  font-size: 16px;
  -webkit-font-smoothing: antialiased;
}

/* ── HEADER ── */
.header {
  position: sticky; top: 0; z-index: 200;
  background: rgba(255,255,255,.98);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--line);
  padding: 0 32px;
  height: 62px;
  display: flex; align-items: center; justify-content: space-between; gap: 20px;
}
.header-left { display: flex; align-items: center; gap: 12px; }
.header-icon {
  width: 36px; height: 36px; border-radius: 9px;
  background: #1c1c2e;
  display: flex; align-items: center; justify-content: center;
}
.header-icon svg { width: 18px; height: 18px; fill: #fff; }
.header-title { font-family: 'DM Serif Display', serif; font-size: 19px; color: var(--ink); letter-spacing: -0.2px; white-space: nowrap; }
.header-subtitle { font-size: 11.5px; color: var(--ink-4); margin-top: 1px; }
.btn-back {
  display: none; align-items: center; gap: 6px;
  padding: 6px 12px; border-radius: 7px;
  border: 1px solid var(--line-2); background: var(--paper-3);
  font-size: 13px; font-weight: 600; color: var(--ink-2);
  cursor: pointer; font-family: 'DM Sans', sans-serif;
  transition: all 0.15s;
}
.btn-back:hover { border-color: var(--ink-2); background: var(--paper); }
.btn-back.visible { display: flex; }
.btn-back svg { width: 14px; height: 14px; }

/* ── MAIN ── */
.main { max-width: 1320px; margin: 0 auto; padding: 28px 24px 64px; }

/* ── STAT CARDS ── */
.home-stats {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 12px;
  margin-bottom: 24px;
}
.stat-card {
  background: #fff; border: 1px solid var(--line);
  border-radius: 14px; padding: 20px 20px 16px;
  box-shadow: var(--shadow);
  display: flex; flex-direction: column; gap: 6px;
  align-items: center; text-align: center;
}
.stat-card-label { font-size: 12px; font-weight: 800; letter-spacing: 0.7px; text-transform: uppercase; color: var(--ink-4); }
.stat-card-val { font-family: 'DM Serif Display', serif; font-size: 42px; line-height: 1; color: var(--ink); }
.stat-card-sub { font-size: 13px; color: var(--ink-4); margin-top: 2px; font-weight: 600; }
.stat-card.accent-red    .stat-card-val { color: var(--n1); }
.stat-card.accent-amber  .stat-card-val { color: var(--n2); }
.stat-card.accent-yellow .stat-card-val { color: var(--n3); }
.stat-card.accent-green  .stat-card-val { color: var(--n4); }

/* ── FILTER BAR ── */
.filter-bar {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 16px; flex-wrap: wrap;
}
.filter-label { font-size: 14px; color: var(--ink); font-weight: 700; margin-right: 4px; }
.filter-btn {
  padding: 6px 16px; border-radius: 99px;
  border: 1px solid var(--line-2); background: #fff;
  font-size: 13px; font-weight: 600; color: var(--ink-3);
  cursor: pointer; font-family: 'DM Sans', sans-serif;
  transition: all 0.15s; white-space: nowrap;
}
.filter-btn:hover { border-color: var(--ink); color: var(--ink); }
.filter-btn.active { background: var(--ink); border-color: var(--ink); color: #fff; }
.filter-divider { width: 1px; height: 20px; background: var(--line-2); }

/* ── HOME TABLE ── */
.home-table {
  background: #fff; border: 1px solid var(--line);
  border-radius: 14px; overflow: hidden; box-shadow: var(--shadow);
}
.ht-head {
  display: grid;
  grid-template-columns: 76px 220px 1fr 1fr 180px 110px 136px;
  background: #f1f3f5; border-bottom: 1px solid var(--line);
}
.ht-th {
  padding: 14px 12px; font-size: 13px; font-weight: 800;
  letter-spacing: 0.5px; text-transform: uppercase; color: var(--ink);
  text-align: center; border-right: 1px solid var(--line);
  white-space: nowrap;
}
.ht-th:last-child { border-right: none; }
.ht-th.left { text-align: left; padding-left: 16px; }

.ht-row {
  display: grid;
  grid-template-columns: 76px 220px 1fr 1fr 180px 110px 136px;
  border-bottom: 1px solid var(--line);
  transition: background 0.12s;
  cursor: pointer;
}
.ht-row:last-child { border-bottom: none; }
.ht-row:hover { background: #f1f3f5; }

.ht-td {
  padding: 16px 12px; display: flex; align-items: center;
  justify-content: center; border-right: 1px solid var(--line);
  font-size: 15px; color: var(--ink); font-weight: 600;
}
.ht-td:last-child { border-right: none; }
.ht-td.left { justify-content: flex-start; text-align: left; padding-left: 16px; }
.rank-td { background: #f1f3f5; }

/* ── PILLS ── */
.rank-pill {
  padding: 3px 10px; border-radius: 99px;
  font-size: 12px; font-weight: 700; letter-spacing: 0.3px;
  text-align: center;
}
.pill-alta   { background: var(--n4-bg); color: var(--n4); }
.pill-media  { background: var(--n3-bg); color: #b8960a; }
.pill-baixa  { background: var(--n1-bg); color: var(--n1); }

/* ── PROGRESS MINI ── */
.mini-prog { flex: 1; display: flex; flex-direction: column; gap: 8px; width: 100%; }
.mini-row { display: flex; align-items: center; gap: 8px; }
.mini-track { flex: 1; height: 6px; background: var(--bar-track); border-radius: 99px; overflow: hidden; }
.mini-fill { height: 100%; border-radius: 99px; }
.fill-green { background: var(--bar-green); }
.fill-red   { background: var(--bar-red); }
.mini-pct { font-size: 12px; font-weight: 700; min-width: 34px; text-align: right; }

/* ── DETAIL BTN ── */
.btn-detail {
  padding: 7px 12px; border-radius: 7px; border: 1px solid var(--line-2);
  background: #fff; font-size: 12px; font-weight: 700; color: var(--ink-2);
  cursor: pointer; display: flex; align-items: center; gap: 5px; transition: all 0.15s;
}
.btn-detail:hover { background: #1c1c2e; color: #fff; border-color: #1c1c2e; }
.btn-detail svg { width: 12px; height: 12px; }

/* ── DETAIL SCREEN ── */
.detail-card {
  background: #fff; border: 1px solid var(--line);
  border-radius: 14px; overflow: hidden; box-shadow: var(--shadow);
  margin-bottom: 16px;
}
.card-main {
  display: grid;
  grid-template-columns: 56px 220px 1fr auto;
  align-items: center;
  min-height: 88px;
}
.col-rank {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 20px 10px; border-right: 1px solid var(--line);
  align-self: stretch; background: #f1f3f5; gap: 6px; text-align: center;
}
.rank-num { font-family: 'DM Serif Display', serif; font-size: 28px; line-height: 1; color: var(--ink-2); }
.col-id {
  padding: 20px; border-right: 1px solid var(--line);
  align-self: stretch; display: flex; flex-direction: column; justify-content: center;
}
.unidade-nome { font-size: 18px; font-weight: 700; color: var(--ink); line-height: 1.2; }
.unidade-code { font-size: 13px; color: var(--ink-4); margin-top: 4px; }

.col-metrics {
  display: flex; align-items: stretch;
  border-right: 1px solid var(--line); align-self: stretch;
}
.metric-group {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 16px 18px; border-right: 1px solid var(--line);
  min-width: 88px; flex: 1; gap: 3px;
}
.metric-group:last-child { border-right: none; }
.metric-group.is-total     { background: #e8f5e9; }
.metric-group.is-total     .mg-val { color: var(--bar-green); }
.metric-group.is-total-nok { background: #fff2f2; }
.metric-group.is-total-nok .mg-val { color: var(--bar-red); }
.mg-label { font-size: 11px; font-weight: 800; letter-spacing: 0.5px; text-transform: uppercase; color: var(--ink-3); white-space: nowrap; margin-bottom: 3px; }
.mg-val { font-size: 24px; font-weight: 700; color: var(--ink); line-height: 1; }

.col-right {
  display: flex; align-items: center;
  padding: 14px 22px; gap: 22px; align-self: stretch; min-width: 360px;
}
.progress-block { flex: 1; display: flex; flex-direction: column; gap: 10px; }
.progress-row { display: flex; flex-direction: column; gap: 4px; }
.progress-label-row { display: flex; justify-content: space-between; align-items: center; }
.prog-label { font-size: 10px; font-weight: 800; letter-spacing: 0.6px; text-transform: uppercase; color: var(--ink-4); }
.prog-pct { font-size: 13px; font-weight: 800; color: var(--ink-2); }
.prog-track { height: 6px; border-radius: 99px; background: var(--bar-track); overflow: hidden; }
.prog-fill { height: 100%; border-radius: 99px; transition: width 0.6s cubic-bezier(.4,0,.2,1); }

.actions-col { display: flex; flex-direction: column; gap: 8px; flex-shrink: 0; }
.btn-card {
  display: flex; align-items: center; gap: 7px;
  padding: 8px 16px; border: 1px solid var(--btn-border);
  border-radius: 8px; background: #fff;
  color: var(--btn-text); font-size: 13px; font-weight: 600;
  cursor: pointer; font-family: 'DM Sans', sans-serif;
  white-space: nowrap; transition: all 0.15s; min-width: 110px;
}
.btn-card:hover { background: #f1f3f5; border-color: #888; }
.btn-card.active { background: #1c1c2e; border-color: #1c1c2e; color: #fff; }
.btn-card svg { width: 14px; height: 14px; flex-shrink: 0; opacity: 0.6; }
.btn-card.active svg { opacity: 1; }

/* ── PANELS ── */
.panel { display: none; }
.panel.open { display: block; }
.panel-body {
  padding: 24px 28px; border-top: 1px solid var(--line); background: #f8f9fa;
}
.panel-title {
  font-family: 'DM Serif Display', serif;
  font-size: 17px; color: var(--ink); margin-bottom: 16px;
  padding-bottom: 10px; border-bottom: 1px solid var(--line);
}

/* ── TABS (categorias) ── */
.cat-tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
.cat-tab {
  padding: 7px 16px; border-radius: 99px; border: 1px solid var(--line-2);
  background: #fff; font-size: 13px; font-weight: 700; color: var(--ink-3);
  cursor: pointer; transition: all .15s; font-family: 'DM Sans', sans-serif;
}
.cat-tab.on { background: var(--ink); border-color: var(--ink); color: #fff; }

/* Item select */
.item-row { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
.item-lbl { font-size: 11px; font-weight: 800; text-transform: uppercase; color: var(--ink-4); white-space: nowrap; }
.item-select {
  padding: 8px 14px; border-radius: 8px; border: 1px solid var(--line-2);
  background: #fff; font-size: 14px; font-weight: 600; color: var(--ink-2);
  cursor: pointer; min-width: 280px; font-family: 'DM Sans', sans-serif;
}

/* Vals grid */
.vals-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
.val-card {
  background: #fff; border: 1px solid var(--line); border-radius: 10px;
  padding: 20px 16px; text-align: center;
}
.val-lbl { font-size: 11px; font-weight: 800; text-transform: uppercase; color: var(--ink-4); margin-bottom: 6px; }
.val-num { font-family: 'DM Serif Display', serif; font-size: 38px; color: var(--ink); line-height: 1; }

/* Chart wrapper */
.chart-wrap {
  position: relative; width: 100%; background: #fff;
  border: 1px solid var(--line); border-radius: 12px;
  padding: 20px; margin-bottom: 0;
  box-shadow: var(--shadow);
}
.chart-legend {
  display: flex; gap: 24px; margin-top: 12px; padding-top: 12px;
  border-top: 1px solid var(--line); flex-wrap: wrap;
}
.legend-item { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 600; color: var(--ink-3); }
.legend-dot { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }

/* Bottom legend bar */
.legend-bar {
  display: flex; align-items: center; gap: 24px; flex-wrap: wrap;
  padding: 10px 16px; background: #fff;
  border: 1px solid var(--line); border-radius: 10px;
  font-size: 13px; color: var(--ink-3); margin-top: 16px;
}
.legend-bar .legend-item { font-weight: 600; }
.legend-sep { width: 1px; height: 16px; background: var(--line-2); }

/* Bottom action banner */
.bottom-bar { margin-top: 20px; display: flex; gap: 14px; flex-wrap: wrap; }
.level-legend {
  flex: 1; min-width: 240px; background: #fff;
  border: 1px solid var(--line); border-radius: 12px; padding: 16px 20px; box-shadow: var(--shadow);
}
.level-legend-title { font-size: 11px; font-weight: 800; letter-spacing: 0.6px; text-transform: uppercase; color: var(--ink-3); margin-bottom: 12px; }
.level-items { display: flex; flex-direction: column; gap: 12px; }
.level-item-row { display: flex; align-items: center; gap: 8px; font-size: 14px; color: var(--ink-2); font-weight: 600; }
.level-dot { width: 26px; height: 26px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 800; flex-shrink: 0; }
.action-banner {
  flex: 2; min-width: 260px; background: #fff8f4; border: 1px solid #f0d8c8;
  border-radius: 12px; padding: 16px 20px; display: flex; align-items: center; gap: 14px;
}
.action-icon { width: 38px; height: 38px; border-radius: 9px; background: #e8924a; display: flex; align-items: center; justify-content: center; font-size: 17px; flex-shrink: 0; }
.action-title { font-size: 14px; font-weight: 700; color: var(--ink); margin-bottom: 3px; }
.action-desc { font-size: 13px; color: var(--ink-3); line-height: 1.4; font-weight: 600; }

.loading { padding: 60px; text-align: center; font-size: 16px; font-weight: 600; color: var(--ink-4); }

/* Screens */
.home-screen, .detail-screen { display: none; }
.home-screen.active, .detail-screen.active { display: block; }

@media (max-width: 1024px) {
  .ht-head, .ht-row { grid-template-columns: 60px 180px 1fr 1fr 140px 90px 110px; }
  .ht-th, .ht-td { font-size: 12px; padding: 12px 6px; }
  .vals-grid { grid-template-columns: repeat(2,1fr); }
}
</style>
</head>
<body>

<header class="header">
  <div class="header-left">
    <button class="btn-back" id="btn-back" onclick="goHome()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      Voltar
    </button>
    <div class="header-icon">
      <svg viewBox="0 0 24 24"><rect x="3" y="13" width="4" height="8" rx="1"/><rect x="10" y="9" width="4" height="12" rx="1"/><rect x="17" y="5" width="4" height="16" rx="1"/></svg>
    </div>
    <div>
      <div class="header-title" id="header-title">Auditorias de Segurança Alimentar</div>
      <div class="header-subtitle" id="sub-info">A carregar…</div>
    </div>
  </div>
</header>

<main class="main">
  <div id="home-screen" class="home-screen">
    <div class="loading">A carregar dados…</div>
  </div>
  <div id="detail-screen" class="detail-screen">
    <div id="detail-app"></div>
  </div>
</main>

<script>
var _unidades = [];
var _activeFilter = 'all';
var _currentUnidadeIdx = null;
var _currentCategoriaIdx = 0;
var _currentItemIdx = 0;
var _panelS = {};
var _catCharts = {};

/* Mapa de letras de categoria para nome completo */
var CAT_NAMES = {
  'A': 'A – Higiene e Limpeza',
  'B': 'B – Armazenamento e Stock',
  'C': 'C – Controlo de Temperaturas',
  'D': 'D – Controlo de Pragas',
  'E': 'E – Documentação HACCP'
};
function catName(letra) {
  return CAT_NAMES[letra] || letra;
}

function fmt(n) { return Number(n||0).toLocaleString('pt-PT'); }

/* Determina pill de conformidade */
function taxaPill(taxa) {
  if (taxa >= 70) return 'pill-alta';
  if (taxa >= 50) return 'pill-media';
  return 'pill-baixa';
}
function taxaLabel(taxa) {
  if (taxa >= 70) return 'Alta';
  if (taxa >= 50) return 'Média';
  return 'Baixa';
}

function svgArrow() {
  return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>';
}
function svgLayers() {
  return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>';
}

/* ── Cálculo de totais reais a partir das categorias ── */
function calcUnidadeTotals(u) {
  var totalItens = 0, totalOK = 0, totalNOK = 0;
  var acoesAbertas = 0, acoesAtraso = 0;
  if (u.categorias) {
    u.categorias.forEach(function(c) {
      var tc = c.totaisCategoria || {};
      totalItens   += tc.total || 0;
      totalOK      += tc.ok   || 0;
      totalNOK     += tc.nok  || 0;
      acoesAbertas += tc.acoes_abertas || 0;
      acoesAtraso  += tc.acoes_atraso  || 0;
    });
  }
  var taxa = totalItens > 0 ? Math.round((totalOK / totalItens) * 100) : 0;
  return { totalItens: totalItens, totalOK: totalOK, totalNOK: totalNOK,
           acoesAbertas: acoesAbertas, acoesAtraso: acoesAtraso, taxa: taxa };
}

/* ── Agrupamento de itens por código (sem duplicação visual) ──
   Cada código único dentro de uma categoria aparece UMA vez no select,
   mas mostramos o estado agregado (se algum NOK → NOK) e listamos todas
   as ocorrências no detalhe. */
function groupItemsByCode(itens) {
  var map = {};
  var order = [];
  itens.forEach(function(item) {
    var key = item.codigo_item;
    if (!map[key]) {
      map[key] = { codigo_item: item.codigo_item, descricao: item.descricao, ocorrencias: [] };
      order.push(key);
    }
    map[key].ocorrencias.push(item);
  });
  return order.map(function(k) { return map[k]; });
}

/* ── Load ── */
fetch('dados.json?t=' + Date.now())
  .then(function(r) { return r.json(); })
  .then(function(json) { processData(json); })
  .catch(function() {
    fetch('Dados.json?t=' + Date.now())
      .then(function(r) { return r.json(); })
      .then(function(json) { processData(json); })
      .catch(function() {
        document.getElementById('home-screen').innerHTML = '<div class="loading" style="color:#b83232">Erro ao carregar dados. Verifique se o ficheiro dados.json existe.</div>';
        document.getElementById('home-screen').classList.add('active');
      });
  });

function processData(json) {
  _unidades = json.unidades || [];
  _unidades.forEach(function(u) {
    u._calc = calcUnidadeTotals(u);
  });
  document.getElementById('sub-info').textContent = _unidades.length + ' unidades';
  renderHome();
}

/* ── Navigation ── */
function goHome() {
  document.getElementById('home-screen').classList.add('active');
  document.getElementById('detail-screen').classList.remove('active');
  document.getElementById('btn-back').classList.remove('visible');
  document.getElementById('header-title').textContent = 'Auditorias de Segurança Alimentar';
  document.getElementById('sub-info').textContent = _unidades.length + ' unidades';
}

function goDetail(idx) {
  _currentUnidadeIdx = idx;
  _currentCategoriaIdx = 0;
  _currentItemIdx = 0;
  _panelS = {};
  document.getElementById('home-screen').classList.remove('active');
  document.getElementById('detail-screen').classList.add('active');
  document.getElementById('btn-back').classList.add('visible');
  var u = _unidades[idx];
  var t = u._calc;
  document.getElementById('header-title').textContent = u.nome;
  document.getElementById('sub-info').textContent = 'Conformidade: ' + t.taxa + '% · ' + fmt(t.totalItens) + ' itens auditados';
  renderDetail(idx);
  window.scrollTo(0, 0);
}

/* ── HOME ── */
function renderHome() {
  var unidades = _unidades;
  var totalItensAll = 0, totalOKAll = 0, totalNOKAll = 0;
  unidades.forEach(function(u) {
    totalItensAll += u._calc.totalItens;
    totalOKAll    += u._calc.totalOK;
    totalNOKAll   += u._calc.totalNOK;
  });
  var taxaGlobal = totalItensAll > 0 ? Math.round((totalOKAll / totalItensAll) * 100) : 0;

  var baixa = unidades.filter(function(u){ return u._calc.taxa < 50; }).length;
  var media = unidades.filter(function(u){ return u._calc.taxa >= 50 && u._calc.taxa < 70; }).length;
  var alta  = unidades.filter(function(u){ return u._calc.taxa >= 70; }).length;

  var html = '';

  /* Ações globais em atraso */
  var totalAcoesAtraso = 0, totalAcoesAbertas = 0;
  unidades.forEach(function(u) {
    totalAcoesAtraso  += u._calc.acoesAtraso;
    totalAcoesAbertas += u._calc.acoesAbertas;
  });

  /* Stats */
  html += '<div class="home-stats">';
  html += statCard('Total Unidades', unidades.length, 'Em monitorização', '');
  html += statCard('Itens Auditados', fmt(totalItensAll), 'Total de registos', '');
  html += statCard('Conformes', fmt(totalOKAll), taxaGlobal + '% do total', 'accent-green');
  html += statCard('Não Conformes', fmt(totalNOKAll), (100 - taxaGlobal) + '% do total', 'accent-red');
  html += statCard('Ações em Atraso', fmt(totalAcoesAtraso), 'De ' + fmt(totalAcoesAbertas) + ' abertas', totalAcoesAtraso > 0 ? 'accent-amber' : '');
  html += '</div>';

  /* Filter bar */
  html += '<div class="filter-bar">';
  html += '<span class="filter-label">Mostrar:</span>';
  html += '<button class="filter-btn active" data-filter="all" onclick="setFilter(\'all\')">Todas (' + unidades.length + ')</button>';
  html += '<div class="filter-divider"></div>';
  html += '<button class="filter-btn" data-filter="baixa" onclick="setFilter(\'baixa\')">🔴 Baixa &lt;50% (' + baixa + ')</button>';
  html += '<button class="filter-btn" data-filter="media" onclick="setFilter(\'media\')">🟡 Média 50–69% (' + media + ')</button>';
  html += '<button class="filter-btn" data-filter="alta"  onclick="setFilter(\'alta\')" >🟢 Alta ≥70% ('  + alta  + ')</button>';
  html += '</div>';

  /* Table */
  html += '<div class="home-table">';
  html += '<div class="ht-head">';
  html += '<div class="ht-th">#</div>';
  html += '<div class="ht-th left">Unidade</div>';
  html += '<div class="ht-th">Total Itens</div>';
  html += '<div class="ht-th">NOK / Ações</div>';
  html += '<div class="ht-th">Conformidade</div>';
  html += '<div class="ht-th">Estado</div>';
  html += '<div class="ht-th">Detalhe</div>';
  html += '</div>';
  html += '<div id="ht-body"></div>';
  html += '</div>';

  /* Bottom */
  html += '<div class="bottom-bar">';
  html += '<div class="level-legend"><div class="level-legend-title">Classificação de Conformidade</div><div class="level-items">';
  html += '<div class="level-item-row"><div class="level-dot pill-alta">Alta</div><span>≥ 70% conformidade</span></div>';
  html += '<div class="level-item-row"><div class="level-dot pill-media">Méd</div><span>50–69% conformidade</span></div>';
  html += '<div class="level-item-row"><div class="level-dot pill-baixa">Bxa</div><span>< 50% conformidade</span></div>';
  html += '</div></div>';
  html += '<div class="action-banner"><div class="action-icon">⚠</div><div><div class="action-title">Ação Recomendada</div><div class="action-desc">Analisar urgentemente unidades com conformidade inferior a 50%. Clique em "Detalhe" para ver categorias e itens auditados.</div></div></div>';
  html += '</div>';

  document.getElementById('home-screen').innerHTML = html;
  document.getElementById('home-screen').classList.add('active');
  renderHomeTable();
}

function statCard(label, val, sub, accent) {
  return '<div class="stat-card ' + (accent || '') + '">'
    + '<div class="stat-card-label">' + label + '</div>'
    + '<div class="stat-card-val">' + val + '</div>'
    + '<div class="stat-card-sub">' + sub + '</div>'
    + '</div>';
}

function setFilter(f) {
  _activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(function(b) {
    b.classList.toggle('active', b.dataset.filter === f);
  });
  renderHomeTable();
}

function renderHomeTable() {
  var unidades = _unidades;
  var f = _activeFilter;
  var filtered = unidades.filter(function(u) {
    var taxa = u._calc.taxa;
    if (f === 'baixa') return taxa < 50;
    if (f === 'media') return taxa >= 50 && taxa < 70;
    if (f === 'alta')  return taxa >= 70;
    return true;
  });

  var html = '';
  if (filtered.length === 0) {
    html = '<div style="padding:32px;text-align:center;color:var(--ink-4);font-size:13px">Sem unidades para este filtro.</div>';
  } else {
    filtered.forEach(function(u) {
      var ui   = unidades.indexOf(u);
      var t    = u._calc;
      var pc   = taxaPill(t.taxa);
      var lbl  = taxaLabel(t.taxa);

      html += '<div class="ht-row" onclick="goDetail(' + ui + ')">';

      /* rank */
      html += '<div class="ht-td rank-td" style="flex-direction:column;gap:6px;align-items:center;background:#f1f3f5">';
      html += '<div style="font-family:\'DM Serif Display\',serif;font-size:26px;font-weight:400;color:var(--ink-2);line-height:1">' + (ui + 1) + '</div>';
      html += '<div class="rank-pill ' + pc + '">' + lbl + '</div>';
      html += '</div>';

      /* identity */
      html += '<div class="ht-td left" style="flex-direction:column;align-items:flex-start;gap:3px">';
      html += '<div style="font-weight:700;font-size:15px">' + u.nome + '</div>';
      html += '<div style="font-size:12px;color:var(--ink-4)">' + (u.localizacao || '') + '</div>';
      html += '</div>';

      /* total itens */
      html += '<div class="ht-td" style="flex-direction:column;gap:3px">';
      html += '<div style="font-size:12px;font-weight:800;letter-spacing:0.5px;text-transform:uppercase;color:var(--ink-4)">Total</div>';
      html += '<div style="font-size:13px;color:var(--ink-3)">' + fmt(t.totalItens) + ' itens</div>';
      html += '</div>';

      /* NOK / ações */
      html += '<div class="ht-td" style="flex-direction:column;gap:3px">';
      html += '<div style="font-size:12px;font-weight:800;letter-spacing:0.5px;text-transform:uppercase;color:var(--ink-4)">NOK / Ações</div>';
      html += '<div style="font-size:13px;color:#ff2222;font-weight:700">' + fmt(t.totalNOK) + ' NOK · ' + fmt(t.acoesAtraso) + ' em atraso</div>';
      html += '</div>';

      /* conformidade progress */
      html += '<div class="ht-td"><div class="mini-prog">';
      html += '<div class="mini-row">'
        + '<span style="font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:0.4px;color:var(--ink-4);min-width:60px">Conforme</span>'
        + '<div class="mini-track"><div class="mini-fill fill-green" style="width:' + t.taxa + '%"></div></div>'
        + '<span class="mini-pct" style="color:var(--bar-green)">' + t.taxa + '%</span>'
        + '</div>';
      html += '<div class="mini-row">'
        + '<span style="font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:0.4px;color:var(--ink-4);min-width:60px">Não Conf.</span>'
        + '<div class="mini-track"><div class="mini-fill fill-red" style="width:' + (100 - t.taxa) + '%"></div></div>'
        + '<span class="mini-pct" style="color:var(--bar-red)">' + (100 - t.taxa) + '%</span>'
        + '</div>';
      html += '</div></div>';

      /* estado (vazio – placeholder para consistência col) */
      html += '<div class="ht-td"></div>';

      /* detail btn */
      html += '<div class="ht-td" onclick="event.stopPropagation()">';
      html += '<button class="btn-detail" onclick="goDetail(' + ui + ')">Detalhe ' + svgArrow() + '</button>';
      html += '</div>';

      html += '</div>';
    });
  }
  document.getElementById('ht-body').innerHTML = html;
}

/* ── DETAIL ── */
function renderDetail(idx) {
  var u = _unidades[idx];
  if (!u) return;
  var t = u._calc;
  var pc  = taxaPill(t.taxa);
  var lbl = taxaLabel(t.taxa);

  var html = '<div class="detail-card">';
  html += '<div class="card-main">';

  /* rank */
  html += '<div class="col-rank"><div class="rank-num">' + (idx + 1) + '</div><div class="rank-pill ' + pc + '">' + lbl + '</div></div>';

  /* identity */
  html += '<div class="col-id"><div class="unidade-nome">' + u.nome + '</div><div class="unidade-code">Conformidade: ' + t.taxa + '%</div></div>';

  /* metrics */
  html += '<div class="col-metrics">';
  [{label:'Total Itens',val:fmt(t.totalItens),cls:''},{label:'Conformes',val:fmt(t.totalOK),cls:'is-total'},{label:'Não Conf.',val:fmt(t.totalNOK),cls:'is-total-nok'}]
    .forEach(function(g){ html += '<div class="metric-group '+g.cls+'"><div class="mg-label">'+g.label+'</div><div class="mg-val">'+g.val+'</div></div>'; });
  html += '</div>';

  /* right: progress + actions */
  html += '<div class="col-right">';
  html += '<div class="progress-block">';
  html += '<div class="progress-row"><div class="progress-label-row"><span class="prog-label">Conformidade</span><span class="prog-pct">' + t.taxa + '%</span></div><div class="prog-track"><div class="prog-fill fill-green" style="width:' + t.taxa + '%"></div></div></div>';
  html += '<div class="progress-row"><div class="progress-label-row"><span class="prog-label">Não Conforme</span><span class="prog-pct">' + (100 - t.taxa) + '%</span></div><div class="prog-track"><div class="prog-fill fill-red" style="width:' + (100 - t.taxa) + '%"></div></div></div>';
  html += '</div>';
  html += '<div class="actions-col">';
  html += '<button class="btn-card" id="bs-' + idx + '" onclick="toggleCategorias(' + idx + ')">' + svgLayers() + 'Categorias</button>';
  html += '</div>';
  html += '</div>';

  html += '</div>'; /* card-main */

  /* Categorias panel */
  html += '<div class="panel" id="ps-' + idx + '"><div class="panel-body">';
  if (u.categorias && u.categorias.length > 0) {
    html += '<div class="panel-title">Categorias de Auditoria · ' + u.nome + '</div>';
    html += '<div class="cat-tabs" id="cat-tabs-' + idx + '">';
    u.categorias.forEach(function(c, ci) {
      html += '<button class="cat-tab' + (ci === 0 ? ' on' : '') + '" onclick="selectCategoria(' + idx + ',' + ci + ')">' + catName(c.categoria) + '</button>';
    });
    html += '</div>';
    html += '<div id="itens-wrap-' + idx + '">' + buildItensHTML(u, 0, 0, idx) + '</div>';
  } else {
    html += '<p style="color:var(--ink-4);font-size:14px">Sem categorias disponíveis para esta unidade.</p>';
  }
  html += '</div></div>';

  html += '</div>'; /* detail-card */

  /* Legend */
  html += '<div class="legend-bar">';
  html += '<div class="legend-item"><div class="legend-dot" style="background:var(--bar-green)"></div><span style="font-weight:700">OK</span> = Conforme</div>';
  html += '<div class="legend-sep"></div>';
  html += '<div class="legend-item"><div class="legend-dot" style="background:var(--bar-red)"></div><span style="font-weight:700">NOK</span> = Não Conforme</div>';
  html += '<div class="legend-sep"></div>';
  html += '<div class="legend-item">Os itens com código repetido representam auditorias distintas ao mesmo ponto de controlo</div>';
  html += '</div>';

  document.getElementById('detail-app').innerHTML = html;
}

function toggleCategorias(idx) {
  _panelS[idx] = !_panelS[idx];
  var p = document.getElementById('ps-' + idx);
  var b = document.getElementById('bs-' + idx);
  if (p) p.classList.toggle('open', _panelS[idx]);
  if (b) b.classList.toggle('active', _panelS[idx]);
  if (_panelS[idx]) {
    setTimeout(function() { buildItensChart(idx, _currentCategoriaIdx); }, 150);
  }
}

function selectCategoria(unidadeIdx, catIdx) {
  _currentCategoriaIdx = catIdx;
  _currentItemIdx = 0;
  document.querySelectorAll('#cat-tabs-' + unidadeIdx + ' .cat-tab').forEach(function(t, i) {
    t.classList.toggle('on', i === catIdx);
  });
  var wrap = document.getElementById('itens-wrap-' + unidadeIdx);
  if (wrap) {
    destroyCatChart(unidadeIdx);
    wrap.innerHTML = buildItensHTML(_unidades[unidadeIdx], catIdx, 0, unidadeIdx);
    setTimeout(function() { buildItensChart(unidadeIdx, catIdx); }, 150);
  }
}

function selectItem(unidadeIdx, val) {
  _currentItemIdx = Number(val);
  var wrap = document.getElementById('itens-wrap-' + unidadeIdx);
  if (wrap) {
    destroyCatChart(unidadeIdx);
    wrap.innerHTML = buildItensHTML(_unidades[unidadeIdx], _currentCategoriaIdx, _currentItemIdx, unidadeIdx);
    setTimeout(function() { buildItensChart(unidadeIdx, _currentCategoriaIdx); }, 150);
  }
}

function destroyCatChart(idx) {
  if (_catCharts['cat-' + idx]) { _catCharts['cat-' + idx].destroy(); delete _catCharts['cat-' + idx]; }
}

/* ── Build HTML de itens (com agrupamento por código) ── */
function buildItensHTML(u, catIdx, itemGroupIdx, unidadeIdx) {
  var cat = u.categorias && u.categorias[catIdx];
  if (!cat || !cat.itens || cat.itens.length === 0) {
    return '<p style="color:var(--ink-4);font-size:14px">Sem itens nesta categoria.</p>';
  }

  /* Agrupar itens por código (evita select com duplicados) */
  var groups = groupItemsByCode(cat.itens);
  var group  = groups[itemGroupIdx] || groups[0];

  /* Calcular estado agregado do grupo */
  var temNOK = group.ocorrencias.some(function(o){ return o.estado === 'NOK'; });
  var estadoAgregado = temNOK ? 'NOK' : 'OK';
  var totalAtraso = group.ocorrencias.reduce(function(acc, o){ return acc + (o.dias_atraso || 0); }, 0);
  var maxAtraso   = group.ocorrencias.reduce(function(acc, o){ return Math.max(acc, o.dias_atraso || 0); }, 0);
  var emAtraso    = group.ocorrencias.filter(function(o){ return o.status_acao === 'Em_Atraso'; }).length;
  var responsaveis = [...new Set(group.ocorrencias.map(function(o){ return o.responsavel_acao; }).filter(Boolean))].join(', ') || 'N/A';

  var html = '<div class="item-row">';
  html += '<span class="item-lbl">Ponto de Controlo:</span>';
  html += '<select class="item-select" onchange="selectItem(' + unidadeIdx + ', this.value)">';
  groups.forEach(function(g, i) {
    var gNOK = g.ocorrencias.some(function(o){ return o.estado === 'NOK'; });
    html += '<option value="' + i + '"' + (i === itemGroupIdx ? ' selected' : '') + '>'
      + g.codigo_item + ' – ' + g.descricao
      + ' (' + g.ocorrencias.length + ' audit.' + (gNOK ? ' · ⚠ NOK' : '') + ')'
      + '</option>';
  });
  html += '</select></div>';

  /* Vals grid */
  html += '<div class="vals-grid">';
  html += valCard('Estado Geral', estadoAgregado, estadoAgregado === 'OK' ? 'color:var(--bar-green)' : 'color:var(--bar-red)');
  html += valCard('Nº Auditorias', group.ocorrencias.length, '');
  html += valCard('Em Atraso', emAtraso, emAtraso > 0 ? 'color:var(--bar-red)' : 'color:var(--bar-green)');
  html += valCard('Máx. Dias Atraso', maxAtraso, maxAtraso > 0 ? 'color:var(--bar-red)' : 'color:var(--bar-green)');
  html += '</div>';

  /* Tabela de ocorrências */
  html += '<div style="background:#fff;border:1px solid var(--line);border-radius:10px;overflow:hidden;margin-bottom:16px">';
  html += '<div style="padding:12px 16px;border-bottom:1px solid var(--line);font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:0.5px;color:var(--ink-4);background:#f8f9fa">';
  html += 'Histórico de Auditorias · ' + group.descricao;
  html += '</div>';
  group.ocorrencias.forEach(function(o, oi) {
    var rowBg = o.estado === 'NOK' ? 'background:#fffafa' : '';
    html += '<div style="display:grid;grid-template-columns:60px 1fr 1fr 1fr 1fr;border-bottom:1px solid var(--line);' + (oi === group.ocorrencias.length - 1 ? 'border-bottom:none;' : '') + rowBg + '">';
    html += '<div style="padding:10px 12px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:' + (o.estado === 'NOK' ? 'var(--bar-red)' : 'var(--bar-green)') + ';border-right:1px solid var(--line)">' + o.estado + '</div>';
    html += '<div style="padding:10px 12px;font-size:12px;color:var(--ink-3);border-right:1px solid var(--line)">';
    html += '<div style="font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:0.4px;color:var(--ink-4)">Responsável</div>';
    html += '<div style="font-weight:600">' + (o.responsavel_acao || 'N/A') + '</div></div>';
    html += '<div style="padding:10px 12px;font-size:12px;color:var(--ink-3);border-right:1px solid var(--line)">';
    html += '<div style="font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:0.4px;color:var(--ink-4)">Prazo</div>';
    html += '<div style="font-weight:600">' + (o.prazo || '—') + '</div></div>';
    html += '<div style="padding:10px 12px;font-size:12px;color:var(--ink-3);border-right:1px solid var(--line)">';
    html += '<div style="font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:0.4px;color:var(--ink-4)">Status Ação</div>';
    var sColor = o.status_acao === 'Concluida' ? 'var(--bar-green)' : o.status_acao === 'Em_Atraso' ? 'var(--bar-red)' : o.status_acao === 'Em_Andamento' ? '#ff7b00' : 'var(--ink-4)';
    html += '<div style="font-weight:700;color:' + sColor + '">' + (o.status_acao || '—') + '</div></div>';
    html += '<div style="padding:10px 12px;font-size:12px;color:var(--ink-3)">';
    html += '<div style="font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:0.4px;color:var(--ink-4)">Medida Corretiva</div>';
    html += '<div style="font-weight:600">' + (o.medida_corretiva || '—') + '</div></div>';
    html += '</div>';
  });
  html += '</div>';

  /* Gráfico */
  html += '<div class="chart-wrap">';
  var cat2 = u.categorias && u.categorias[catIdx];
  var catTitulo = cat2 ? catName(cat2.categoria) : 'Categoria';
  html += '<div style="font-size:13px;font-weight:700;color:var(--ink-3);margin-bottom:14px">Conformidade · ' + catTitulo + '</div>';
  html += '<canvas id="catChart-' + unidadeIdx + '" style="max-height:200px"></canvas>';
  html += '<div class="chart-legend">';
  html += '<div class="legend-item"><div class="legend-dot" style="background:var(--bar-green)"></div>Conforme (OK)</div>';
  html += '<div class="legend-item"><div class="legend-dot" style="background:var(--bar-red)"></div>Não Conforme (NOK)</div>';
  html += '</div></div>';

  return html;
}

function valCard(label, val, style) {
  return '<div class="val-card"><div class="val-lbl">' + label + '</div><div class="val-num" style="' + style + '">' + val + '</div></div>';
}

function buildItensChart(unidadeIdx, catIdx) {
  var u = _unidades[unidadeIdx];
  if (!u || !u.categorias) return;
  var cat = u.categorias[catIdx];
  if (!cat) return;
  var canvas = document.getElementById('catChart-' + unidadeIdx);
  if (!canvas) return;

  destroyCatChart(unidadeIdx);

  var okCount  = cat.totaisCategoria.ok  || 0;
  var nokCount = cat.totaisCategoria.nok || 0;

  _catCharts['cat-' + unidadeIdx] = new Chart(canvas.getContext('2d'), {
    type: 'bar',
    plugins: [ChartDataLabels],
    data: {
      labels: ['Conformidade'],
      datasets: [
        {
          label: 'OK',
          data: [okCount],
          backgroundColor: 'rgba(112,173,71,.8)',
          borderRadius: 4, borderWidth: 0, barPercentage: 0.6, categoryPercentage: 0.7
        },
        {
          label: 'NOK',
          data: [nokCount],
          backgroundColor: 'rgba(255,34,34,.85)',
          borderRadius: 4, borderWidth: 0, barPercentage: 0.6, categoryPercentage: 0.7
        }
      ]
    },
    options: {
      indexAxis: 'y',
      responsive: true,
      maintainAspectRatio: true,
      layout: { padding: { right: 50, top: 8, bottom: 4, left: 4 } },
      plugins: {
        legend: { display: false },
        datalabels: {
          anchor: 'end', align: 'end',
          formatter: function(v){ return v; },
          font: { size: 14, weight: '700', family: 'DM Sans' },
          color: '#1a1a1a', offset: 4
        },
        tooltip: {
          callbacks: { label: function(c){ return ' ' + c.dataset.label + ': ' + c.parsed.x; } }
        }
      },
      scales: {
        x: {
          beginAtZero: true,
          ticks: { font: { size: 12, weight: '600' }, stepSize: 1 },
          grid: { color: 'rgba(0,0,0,.06)' },
          title: { display: true, text: 'Nº de Itens', color: '#777', font: { size: 12, weight: '700' } }
        },
        y: {
          ticks: { font: { size: 14, weight: '700', family: 'DM Sans' }, color: '#1a1a1a' },
          grid: { display: false }
        }
      }
    }
  });
}
</script>
</body>
</html>
