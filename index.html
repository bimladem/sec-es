<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monitorização HACCP</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-datalabels/2.1.0/chartjs-plugin-datalabels.min.js"></script>
<style>
:root {
  --ink:#000;--ink-2:#1a1a1a;--ink-3:#333;--ink-4:#555;
  --paper:#fff;--paper-2:#f8f9fa;--paper-3:#f1f3f5;
  --line:#d1d1d1;--line-2:#b1b1b1;
  --n1:#ff2222;--n1-bg:#fff2f2;
  --n2:#ff7b00;--n2-bg:#fff3e6;
  --n3:#ffcc00;--n3-bg:#fffbe6;
  --n4:#888;--n4-bg:#f1f3f5;
  --ok:#1a7a4a;--ok-bg:#e8f5ee;
  --blue:#2b2fd8;--orange:#d8722a;--track:#e4e4e8;
  --shadow:0 1px 4px rgba(0,0,0,.06),0 2px 12px rgba(0,0,0,.04);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--paper);color:var(--ink);font-size:16px;-webkit-font-smoothing:antialiased;}

.header{position:sticky;top:0;z-index:200;background:rgba(255,255,255,.98);backdrop-filter:blur(16px);border-bottom:1px solid var(--line);padding:0 32px;height:62px;display:flex;align-items:center;gap:20px;}
.header-left{display:flex;align-items:center;gap:12px;flex:1;}
.header-icon{width:36px;height:36px;border-radius:9px;background:#1c1c2e;display:flex;align-items:center;justify-content:center;}
.header-icon svg{width:18px;height:18px;fill:#fff;}
.h-title{font-family:'DM Serif Display',serif;font-size:19px;letter-spacing:-.2px;white-space:nowrap;}
.h-sub{font-size:11.5px;color:var(--ink-4);margin-top:1px;}
.btn-back{display:none;align-items:center;gap:6px;padding:6px 12px;border-radius:7px;border:1px solid var(--line-2);background:var(--paper-3);font-size:13px;font-weight:600;color:var(--ink-2);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;}
.btn-back:hover{border-color:var(--ink-2);background:var(--paper);}
.btn-back.v{display:flex;}
.btn-back svg{width:14px;height:14px;}
.header-date{font-size:12px;color:var(--ink-4);white-space:nowrap;}

.main{max-width:1320px;margin:0 auto;padding:28px 24px 64px;}
.loading{padding:60px;text-align:center;font-size:16px;font-weight:600;color:var(--ink-4);}

/* ── STAT CARDS ── */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:24px;}
.stat-card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:18px 16px 14px;box-shadow:var(--shadow);display:flex;flex-direction:column;gap:4px;align-items:center;text-align:center;}
.sc-label{font-size:11px;font-weight:800;letter-spacing:.7px;text-transform:uppercase;color:var(--ink-4);}
.sc-val{font-family:'DM Serif Display',serif;font-size:40px;line-height:1;color:var(--ink);}
.sc-sub{font-size:12px;color:var(--ink-4);font-weight:600;}
.acc-red .sc-val{color:var(--n1);}
.acc-amber .sc-val{color:var(--n2);}
.acc-yellow .sc-val{color:var(--n3);}
.acc-blue .sc-val{color:var(--blue);}

/* ── FILTER ── */
.filter-bar{display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.filter-label{font-size:14px;font-weight:700;margin-right:4px;}
.fbtn{padding:6px 16px;border-radius:99px;border:1px solid var(--line-2);background:#fff;font-size:13px;font-weight:600;color:var(--ink-3);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;white-space:nowrap;}
.fbtn:hover{border-color:var(--ink);color:var(--ink);}
.fbtn.on{background:var(--ink);border-color:var(--ink);color:#fff;}
.fdiv{width:1px;height:20px;background:var(--line-2);}

/* ── HOME TABLE ── */
.home-table{background:#fff;border:1px solid var(--line);border-radius:14px;overflow:hidden;box-shadow:var(--shadow);}
.ht-head{display:grid;grid-template-columns:72px 200px 1fr 1fr 200px 130px;background:#f1f3f5;border-bottom:1px solid var(--line);}
.ht-th{padding:13px 10px;font-size:12px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;color:var(--ink);text-align:center;border-right:1px solid var(--line);white-space:nowrap;}
.ht-th:last-child{border-right:none;}
.ht-th.L{text-align:left;padding-left:14px;}
.ht-row{display:grid;grid-template-columns:72px 200px 1fr 1fr 200px 130px;border-bottom:1px solid var(--line);cursor:pointer;transition:background .12s;}
.ht-row:last-child{border-bottom:none;}
.ht-row:hover{background:#f1f3f5;}
.ht-td{padding:15px 10px;display:flex;align-items:center;justify-content:center;border-right:1px solid var(--line);font-size:14px;color:var(--ink);font-weight:600;}
.ht-td:last-child{border-right:none;}
.ht-td.L{justify-content:flex-start;padding-left:14px;}

/* ── PILLS ── */
.pill{padding:3px 10px;border-radius:99px;font-size:11px;font-weight:700;text-align:center;}
.p-n1{background:var(--n1-bg);color:var(--n1);}
.p-n2{background:var(--n2-bg);color:var(--n2);}
.p-n3{background:var(--n3-bg);color:var(--n3);}
.p-n4{background:var(--n4-bg);color:var(--n4);}
.p-ok{background:var(--ok-bg);color:var(--ok);}

/* ── MINI BARS ── */
.mini-prog{flex:1;display:flex;flex-direction:column;gap:7px;width:100%;}
.mini-row{display:flex;align-items:center;gap:7px;}
.mini-lbl{font-size:10px;font-weight:800;text-transform:uppercase;color:var(--ink-4);min-width:20px;}
.mini-track{flex:1;height:6px;background:var(--track);border-radius:99px;overflow:hidden;}
.mini-fill{height:100%;border-radius:99px;}
.f-blue{background:var(--blue);}
.f-orange{background:var(--orange);}
.f-red{background:var(--n1);}
.mini-pct{font-size:11px;font-weight:700;min-width:32px;text-align:right;}

/* ── DETAIL BTN ── */
.btn-det{padding:6px 11px;border-radius:7px;border:1px solid var(--line-2);background:#fff;font-size:12px;font-weight:700;color:var(--ink-2);cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .15s;}
.btn-det:hover{background:#1c1c2e;color:#fff;border-color:#1c1c2e;}

/* ── SCREENS ── */
.home-screen,.detail-screen{display:none;}
.home-screen.act,.detail-screen.act{display:block;}

/* ── DETAIL ── */
.det-card{background:#fff;border:1px solid var(--line);border-radius:14px;overflow:hidden;box-shadow:var(--shadow);margin-bottom:16px;}
.card-top{display:grid;grid-template-columns:56px 200px 1fr auto;align-items:center;min-height:86px;}
.col-rank{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:18px 8px;border-right:1px solid var(--line);align-self:stretch;background:#f1f3f5;gap:6px;}
.rank-num{font-family:'DM Serif Display',serif;font-size:26px;line-height:1;color:var(--ink-2);}
.col-id{padding:18px;border-right:1px solid var(--line);align-self:stretch;display:flex;flex-direction:column;justify-content:center;}
.u-nome{font-size:18px;font-weight:700;}
.u-sub{font-size:12px;color:var(--ink-4);margin-top:3px;}
.col-cats{display:flex;align-items:stretch;border-right:1px solid var(--line);align-self:stretch;overflow-x:auto;}
.cat-group{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:12px 14px;border-right:1px solid var(--line);min-width:80px;flex:1;gap:2px;cursor:pointer;transition:background .12s;}
.cat-group:last-child{border-right:none;}
.cat-group:hover{background:#f8f9fa;}
.cat-group.sel{background:#f0f2ff;}
.cg-label{font-size:10px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;color:var(--ink-3);}
.cg-taxa{font-size:20px;font-weight:700;color:var(--ink);}
.cg-atraso{font-size:11px;color:var(--n1);font-weight:700;}
.col-right{display:flex;align-items:center;padding:12px 18px;gap:16px;align-self:stretch;min-width:200px;}
.prog-block{flex:1;display:flex;flex-direction:column;gap:8px;}
.prog-row{display:flex;flex-direction:column;gap:3px;}
.prog-lr{display:flex;justify-content:space-between;align-items:center;}
.prog-lbl{font-size:10px;font-weight:800;letter-spacing:.6px;text-transform:uppercase;color:var(--ink-4);}
.prog-pct{font-size:12px;font-weight:800;color:var(--ink-2);}
.prog-track{height:6px;border-radius:99px;background:var(--track);overflow:hidden;}
.prog-fill{height:100%;border-radius:99px;transition:width .5s cubic-bezier(.4,0,.2,1);}

/* ── CAT PANEL ── */
.cat-panel{display:none;border-top:1px solid var(--line);background:#f8f9fa;}
.cat-panel.open{display:block;}
.cat-body{padding:22px 26px;}
.cat-title{font-family:'DM Serif Display',serif;font-size:16px;color:var(--ink);margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--line);}

/* ── TABS: VISÃO / HISTÓRICO ── */
.view-tabs{display:flex;gap:4px;margin-bottom:18px;}
.vtab{padding:6px 18px;border-radius:99px;border:1px solid var(--line-2);background:#fff;font-size:13px;font-weight:700;color:var(--ink-3);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;}
.vtab.on{background:var(--ink);border-color:var(--ink);color:#fff;}

/* ── VISÃO ATUAL ── */
.vals-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px;}
.val-card{background:#fff;border:1px solid var(--line);border-radius:10px;padding:16px;text-align:center;}
.val-lbl{font-size:10px;font-weight:800;text-transform:uppercase;color:var(--ink-4);margin-bottom:5px;}
.val-num{font-family:'DM Serif Display',serif;font-size:36px;color:var(--ink);line-height:1;}
.chart-wrap{background:#fff;border:1px solid var(--line);border-radius:12px;padding:18px;box-shadow:var(--shadow);}
.chart-leg{display:flex;gap:20px;margin-top:10px;padding-top:10px;border-top:1px solid var(--line);flex-wrap:wrap;}
.leg-item{display:flex;align-items:center;gap:7px;font-size:12px;font-weight:600;color:var(--ink-3);}
.leg-dot{width:11px;height:11px;border-radius:3px;flex-shrink:0;}

/* ── HISTÓRICO TABLE ── */
.hist-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px;}
.hs-card{background:#fff;border:1px solid var(--line);border-radius:8px;padding:12px;text-align:center;}
.hs-lbl{font-size:10px;font-weight:800;text-transform:uppercase;color:var(--ink-4);margin-bottom:3px;}
.hs-val{font-size:22px;font-weight:700;font-family:'DM Serif Display',serif;}

.hist-table-wrap{background:#fff;border:1px solid var(--line);border-radius:12px;overflow:hidden;box-shadow:var(--shadow);}
.hist-table{width:100%;border-collapse:collapse;}
.hist-table thead tr{background:#2a2a2a;}
.hist-table thead th{padding:10px 12px;font-size:11px;font-weight:800;letter-spacing:.6px;text-transform:uppercase;color:#fff;text-align:left;white-space:nowrap;border-right:1px solid rgba(255,255,255,.08);}
.hist-table thead th:last-child{border-right:none;}
.hist-table thead th.c{text-align:center;}
.hist-table tbody tr{border-bottom:1px solid var(--line);transition:background .1s;}
.hist-table tbody tr:last-child{border-bottom:none;}
.hist-table tbody tr:hover{background:#f8f9fa;}
.hist-table tbody td{padding:11px 12px;font-size:13px;color:#555;font-weight:600;vertical-align:middle;border-right:1px solid var(--line);}
.hist-table tbody td:last-child{border-right:none;}
.hist-table tbody td.c{text-align:center;}
.hist-table .td-idx{font-family:'DM Serif Display',serif;font-size:15px;color:var(--ink-4);text-align:center;width:36px;}
.hist-table .td-code{font-size:12px;font-weight:700;color:var(--ink-2);white-space:nowrap;}
.hist-table .td-desc{font-size:12px;color:var(--ink-3);max-width:260px;}
.hist-table .td-mc{font-size:11px;color:var(--ink-4);max-width:200px;}
.hist-table .td-resp{font-size:11px;color:var(--ink-4);white-space:nowrap;}
.hist-table .td-prazo{font-size:11px;color:var(--ink-4);white-space:nowrap;text-align:center;}
.hist-table .td-conc{font-size:11px;color:var(--ok);white-space:nowrap;text-align:center;}
.hist-table .td-atraso{font-size:12px;font-weight:700;color:var(--n1);text-align:center;white-space:nowrap;}
.hist-table .td-estado{text-align:center;}
.hist-table .td-status{text-align:center;}

.est-badge{display:inline-block;padding:2px 9px;border-radius:99px;font-size:11px;font-weight:700;}
.est-ok{background:var(--ok-bg);color:var(--ok);}
.est-nok{background:var(--n1-bg);color:var(--n1);}

.status-badge{display:inline-block;padding:2px 9px;border-radius:99px;font-size:10px;font-weight:700;white-space:nowrap;}
.s-ok{background:var(--ok-bg);color:var(--ok);}
.s-atraso{background:var(--n1-bg);color:var(--n1);}
.s-andamento{background:#e8f0fe;color:#1a56c4;}
.s-na{background:#f1f3f5;color:#888;}

/* ── BOTTOM ── */
.bottom-bar{margin-top:20px;display:flex;gap:14px;flex-wrap:wrap;}
.level-legend{flex:1;min-width:220px;background:#fff;border:1px solid var(--line);border-radius:12px;padding:14px 18px;box-shadow:var(--shadow);}
.ll-title{font-size:11px;font-weight:800;letter-spacing:.6px;text-transform:uppercase;color:var(--ink-3);margin-bottom:10px;}
.ll-items{display:flex;flex-direction:column;gap:10px;}
.ll-row{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--ink-2);font-weight:600;}
.ll-dot{width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;flex-shrink:0;}
.action-banner{flex:2;min-width:240px;background:#fff8f4;border:1px solid #f0d8c8;border-radius:12px;padding:14px 18px;display:flex;align-items:center;gap:12px;}
.action-icon{width:36px;height:36px;border-radius:9px;background:#e8924a;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.act-title{font-size:14px;font-weight:700;margin-bottom:2px;}
.act-desc{font-size:12px;color:var(--ink-3);line-height:1.4;font-weight:600;}

/* legend bar */
.leg-bar{display:flex;align-items:center;gap:20px;flex-wrap:wrap;padding:10px 14px;background:#fff;border:1px solid var(--line);border-radius:10px;font-size:12px;color:var(--ink-3);margin-top:14px;}
.leg-sep{width:1px;height:14px;background:var(--line-2);}

@media(max-width:1024px){
  .ht-head,.ht-row{grid-template-columns:60px 160px 1fr 1fr 160px 110px;}
  .ht-th,.ht-td{font-size:11px;padding:10px 6px;}
  .vals-grid{grid-template-columns:repeat(2,1fr);}
  .hist-stats{grid-template-columns:repeat(2,1fr);}
  .hist-table-wrap{overflow-x:auto;}
}
</style>
</head>
<body>

<header class="header">
  <div class="header-left">
    <button class="btn-back" id="btn-back" onclick="goHome()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      Voltar
    </button>
    <div class="header-icon">
      <svg viewBox="0 0 24 24"><rect x="3" y="13" width="4" height="8" rx="1"/><rect x="10" y="9" width="4" height="12" rx="1"/><rect x="17" y="5" width="4" height="16" rx="1"/></svg>
    </div>
    <div>
      <div class="h-title" id="h-title">Monitorização HACCP</div>
      <div class="h-sub" id="h-sub">A carregar…</div>
    </div>
  </div>
  <div class="header-date" id="h-date"></div>
</header>

<main class="main">
  <div id="home-screen" class="home-screen"><div class="loading">A carregar dados…</div></div>
  <div id="detail-screen" class="detail-screen"><div id="det-app"></div></div>
</main>

<script>
var _U = [];
var _filter = 'all';
var _charts = {};
var _catSel = {};
var _viewMode = {};

/* ── helpers ── */
function fmt(n){return Number(n||0).toLocaleString('pt-PT');}
function pCls(n){
  var s=String(n||'').toUpperCase();
  return s==='N1'?'p-n1':s==='N2'?'p-n2':s==='N3'?'p-n3':s==='N4'?'p-n4':'p-ok';
}
function svgArr(){return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="12" height="12"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>';}

/* ── data ── */
fetch('dados.json?t='+Date.now())
  .then(function(r){return r.json();})
  .then(init)
  .catch(function(){
    fetch('Dados.json?t='+Date.now()).then(function(r){return r.json();}).then(init)
    .catch(function(){
      document.getElementById('home-screen').innerHTML='<div class="loading" style="color:#b83232">Erro ao carregar dados.json</div>';
      document.getElementById('home-screen').classList.add('act');
    });
  });

function init(json){
  var raw = json.unidades || json.lojas || [];
  _U = raw.map(function(u){
    if(u.categorias) return u;
    var cats = [];
    if(u.areas){
      u.areas.forEach(function(a){
        var itens=[];
        if(a.subareas) a.subareas.forEach(function(s){if(s.itens) itens=itens.concat(s.itens);});
        cats.push({categoria:a.area,taxa:0,nivel:'N4',totaisCategoria:{total:itens.length,ok:0,nok:0,acoes_abertas:0,acoes_atraso:0},itens:itens});
      });
    }
    return Object.assign({},u,{categorias:cats});
  });

  _U.forEach(function(u){
    var totalOK=0,totalItens=0,totalNOK=0,totalAtraso=0;
    (u.categorias||[]).forEach(function(c){
      var t=c.totaisCategoria||{};
      totalOK+=(t.ok||0);
      totalNOK+=(t.nok||0);
      totalItens+=(t.total||0);
      totalAtraso+=(t.acoes_atraso||0);
    });
    u._totalItens=totalItens;
    u._totalOK=totalOK;
    u._totalNOK=totalNOK;
    u._totalAtraso=totalAtraso;
    u._taxaGlobal=totalItens>0?Math.round(totalOK/totalItens*100):0;
  });

  var d=new Date((json.atualizadoEm||Date.now()));
  document.getElementById('h-date').textContent='Atualizado: '+d.toLocaleDateString('pt-PT',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
  document.getElementById('h-sub').textContent=_U.length+' unidades';
  renderHome();
}

/* ── navigation ── */
function goHome(){
  document.getElementById('home-screen').classList.add('act');
  document.getElementById('detail-screen').classList.remove('act');
  document.getElementById('btn-back').classList.remove('v');
  document.getElementById('h-title').textContent='Monitorização HACCP';
  document.getElementById('h-sub').textContent=_U.length+' unidades';
}
function goDetail(i){
  document.getElementById('home-screen').classList.remove('act');
  document.getElementById('detail-screen').classList.add('act');
  document.getElementById('btn-back').classList.add('v');
  var u=_U[i];
  document.getElementById('h-title').textContent=u.nome;
  document.getElementById('h-sub').textContent='Detalhe · '+(u.nivel||'—');
  _catSel[i]=0;
  _viewMode[i]='atual';
  renderDetail(i);
  window.scrollTo(0,0);
}

/* ── HOME ── */
function renderHome(){
  var n1=_U.filter(function(u){return String(u.nivel||'').toUpperCase()==='N1';}).length;
  var n2=_U.filter(function(u){return String(u.nivel||'').toUpperCase()==='N2';}).length;
  var n3=_U.filter(function(u){return String(u.nivel||'').toUpperCase()==='N3';}).length;
  var totalAtraso=_U.reduce(function(s,u){return s+(u._totalAtraso||0);},0);

  var h='';
  h+='<div class="stats-grid">';
  h+=sc('Unidades',_U.length,'Total','');
  h+=sc('Nível 1',n1,'Crítico','acc-red');
  h+=sc('Nível 2',n2,'Atenção','acc-amber');
  h+=sc('Nível 3',n3,'Moderado','acc-yellow');
  h+=sc('Ações atraso',totalAtraso,'Em todas as unidades','acc-red');
  h+='</div>';

  h+='<div class="filter-bar">';
  h+='<span class="filter-label">Mostrar:</span>';
  h+=fb('Todas ('+_U.length+')','all');
  h+='<div class="fdiv"></div>';
  h+=fb('🔴 N1 ('+n1+')','n1');
  h+=fb('🟠 N2 ('+n2+')','n2');
  h+=fb('🟡 N3 ('+n3+')','n3');
  h+='</div>';

  h+='<div class="home-table">';
  h+='<div class="ht-head">';
  h+='<div class="ht-th">#</div>';
  h+='<div class="ht-th L">Unidade</div>';
  h+='<div class="ht-th">OK / Total</div>';
  h+='<div class="ht-th">Ações atraso</div>';
  h+='<div class="ht-th">Taxa conformidade</div>';
  h+='<div class="ht-th">Detalhe</div>';
  h+='</div>';
  h+='<div id="ht-body"></div>';
  h+='</div>';

  h+='<div class="bottom-bar">';
  h+='<div class="level-legend"><div class="ll-title">Classificação de Nível</div><div class="ll-items">';
  h+='<div class="ll-row"><div class="ll-dot p-n1">N1</div><span>Crítico — requer ação imediata</span></div>';
  h+='<div class="ll-row"><div class="ll-dot p-n2">N2</div><span>Atenção — monitorizar de perto</span></div>';
  h+='<div class="ll-row"><div class="ll-dot p-n3">N3</div><span>Moderado — acompanhamento</span></div>';
  h+='</div></div>';
  h+='<div class="action-banner"><div class="action-icon">⚠</div><div><div class="act-title">Ação Recomendada</div><div class="act-desc">Clique em "Detalhe" para ver as categorias A–E, o histórico de avaliações e ações em atraso.</div></div></div>';
  h+='</div>';

  document.getElementById('home-screen').innerHTML=h;
  document.getElementById('home-screen').classList.add('act');
  renderTable();
}
function sc(label,val,sub,accent){
  return '<div class="stat-card '+(accent||'')+'"><div class="sc-label">'+label+'</div><div class="sc-val">'+val+'</div><div class="sc-sub">'+sub+'</div></div>';
}
function fb(txt,f){
  return '<button class="fbtn'+((_filter===f)?' on':'')+'" data-f="'+f+'" onclick="setF(\''+f+'\')">'+txt+'</button>';
}
function setF(f){
  _filter=f;
  document.querySelectorAll('.fbtn').forEach(function(b){b.classList.toggle('on',b.dataset.f===f);});
  renderTable();
}
function renderTable(){
  var f=_filter;
  var list=_U.filter(function(u){
    var n=String(u.nivel||'').toUpperCase();
    if(f==='n1') return n==='N1';
    if(f==='n2') return n==='N2';
    if(f==='n3') return n==='N3';
    return true;
  });
  var h='';
  if(list.length===0){
    h='<div style="padding:28px;text-align:center;color:var(--ink-4);font-size:13px">Sem unidades para este filtro.</div>';
  } else {
    list.forEach(function(u){
      var i=_U.indexOf(u);
      var pc=pCls(u.nivel);
      var taxa=u._taxaGlobal||0;
      var totalOK=u._totalOK||0;
      var totalItens=u._totalItens||0;
      var atraso=u._totalAtraso||0;
      var corTaxa=taxa>=70?'var(--ok)':taxa>=40?'var(--n2)':'var(--n1)';

      h+='<div class="ht-row" onclick="goDetail('+i+')">';
      h+='<div class="ht-td" style="flex-direction:column;gap:5px;background:#f1f3f5">';
      h+='<div style="font-family:\'DM Serif Display\',serif;font-size:22px;color:var(--ink-2)">'+(i+1)+'</div>';
      h+='</div>';
      h+='<div class="ht-td L" style="flex-direction:column;align-items:flex-start;gap:2px">';
      h+='<div style="font-weight:700;font-size:14px">'+u.nome+'</div>';
      h+='<div style="font-size:11px;color:var(--ink-4)">'+(u.localizacao||'')+'</div>';
      h+='</div>';
      h+='<div class="ht-td" style="flex-direction:column;gap:2px">';
      h+='<div style="font-size:15px;font-weight:700"><span style="color:var(--ok)">'+fmt(totalOK)+'</span> / '+fmt(totalItens)+'</div>';
      h+='<div style="font-size:11px;color:var(--ink-4)">itens conformes</div>';
      h+='</div>';
      h+='<div class="ht-td" style="flex-direction:column;gap:2px">';
      h+='<div style="font-size:15px;font-weight:700;color:'+(atraso>0?'var(--n1)':'var(--ok)')+'">'+fmt(atraso)+'</div>';
      h+='<div style="font-size:11px;color:var(--ink-4)">ações em atraso</div>';
      h+='</div>';
      h+='<div class="ht-td"><div class="mini-prog">';
      h+='<div class="mini-row"><div class="mini-track"><div class="mini-fill f-blue" style="width:'+taxa+'%"></div></div><span class="mini-pct" style="color:'+corTaxa+'">'+taxa+'%</span></div>';
      h+='</div></div>';
      h+='<div class="ht-td" onclick="event.stopPropagation()"><button class="btn-det" onclick="goDetail('+i+')">Detalhe '+svgArr()+'</button></div>';
      h+='</div>';
    });
  }
  document.getElementById('ht-body').innerHTML=h;
}

/* ── DETAIL ── */
function renderDetail(i){
  var u=_U[i];
  if(!u) return;
  var taxa=u._taxaGlobal||0;
  var atraso=u._totalAtraso||0;
  var totalItens=u._totalItens||0;
  var totalOK=u._totalOK||0;
  var totalNOK=u._totalNOK||0;
  var pc=pCls(u.nivel);
  var cats=u.categorias||[];

  var h='<div class="det-card">';
  h+='<div class="card-top">';
  h+='<div class="col-rank"><div class="rank-num">'+(i+1)+'</div><div class="pill '+pc+'">'+(u.nivel||'—')+'</div></div>';
  h+='<div class="col-id"><div class="u-nome">'+u.nome+'</div><div class="u-sub">Taxa global: '+taxa+'% · '+totalOK+'/'+totalItens+' conformes</div>';
  if(atraso>0) h+='<div class="u-sub" style="color:var(--n1);margin-top:4px">⚠ '+atraso+' ações em atraso</div>';
  h+='</div>';
  h+='<div class="col-cats">';
  cats.forEach(function(c,ci){
    var t=c.totaisCategoria||{};
    var sel=(_catSel[i]===ci);
    h+='<div class="cat-group'+(sel?' sel':'')+'" onclick="selCat('+i+','+ci+')" title="Categoria '+c.categoria+'">';
    h+='<div class="cg-label">Categoria '+c.categoria+'</div>';
    h+='<div class="cg-taxa" style="color:'+(c.taxa>=70?'var(--ok)':c.taxa>=40?'var(--n2)':'var(--n1)')+'">'+c.taxa+'%</div>';
    if(t.acoes_atraso>0) h+='<div class="cg-atraso">'+t.acoes_atraso+' atrasos</div>';
    else h+='<div style="font-size:10px;color:var(--ok)">✓ OK</div>';
    h+='</div>';
  });
  h+='</div>';
  h+='<div class="col-right"><div class="prog-block">';
  h+='<div class="prog-row"><div class="prog-lr"><span class="prog-lbl">Conformidade</span><span class="prog-pct">'+taxa+'%</span></div><div class="prog-track"><div class="prog-fill f-blue" style="width:'+taxa+'%"></div></div></div>';
  var pctAtraso=totalNOK>0?Math.round(atraso/totalNOK*100):0;
  h+='<div class="prog-row"><div class="prog-lr"><span class="prog-lbl">Ações em atraso</span><span class="prog-pct" style="color:var(--n1)">'+pctAtraso+'%</span></div><div class="prog-track"><div class="prog-fill f-red" style="width:'+pctAtraso+'%"></div></div></div>';
  h+='</div></div>';
  h+='</div></div>';

  h+='<div class="cat-panel open" id="cp-'+i+'">';
  h+='<div class="cat-body" id="cb-'+i+'">'+buildCatBody(u,i,_catSel[i]||0)+'</div>';
  h+='</div>';
  h+='</div>';

  h+='<div class="leg-bar">';
  h+='<div class="leg-item"><div class="leg-dot" style="background:var(--ok)"></div>Conforme</div>';
  h+='<div class="leg-sep"></div>';
  h+='<div class="leg-item"><div class="leg-dot" style="background:var(--n1)"></div>Não Conforme</div>';
  h+='<div class="leg-sep"></div>';
  h+='<div class="leg-item"><div class="leg-dot" style="background:var(--n2)"></div>Ação em atraso</div>';
  h+='</div>';

  document.getElementById('det-app').innerHTML=h;
  setTimeout(function(){buildChart(u,i,_catSel[i]||0);},150);
}

function selCat(ui,ci){
  _catSel[ui]=ci;
  _viewMode[ui]='atual';
  var groups=document.querySelectorAll('#det-app .cat-group');
  groups.forEach(function(g,gi){g.classList.toggle('sel',gi===ci);});
  var u=_U[ui];
  var cb=document.getElementById('cb-'+ui);
  if(cb){
    if(_charts['c-'+ui]){_charts['c-'+ui].destroy();delete _charts['c-'+ui];}
    cb.innerHTML=buildCatBody(u,ui,ci);
    setTimeout(function(){buildChart(u,ui,ci);},150);
  }
}

function setView(ui,mode){
  _viewMode[ui]=mode;
  document.querySelectorAll('.vtab').forEach(function(t){t.classList.toggle('on',t.dataset.v===mode);});
  var u=_U[ui];
  var ci=_catSel[ui]||0;
  var wrap=document.getElementById('view-wrap-'+ui);
  if(wrap){
    if(_charts['c-'+ui]){_charts['c-'+ui].destroy();delete _charts['c-'+ui];}
    wrap.innerHTML=(mode==='atual')?buildAtual(u,ui,ci):buildHistorico(u,ci);
    if(mode==='atual') setTimeout(function(){buildChart(u,ui,ci);},150);
  }
}

function buildCatBody(u,ui,ci){
  var cat=u.categorias&&u.categorias[ci];
  if(!cat) return '<p style="color:var(--ink-4)">Sem dados para esta categoria.</p>';
  var h='<div class="cat-title">Categoria '+cat.categoria+' · '+u.nome+'</div>';
  h+='<div class="view-tabs">';
  h+='<button class="vtab'+(_viewMode[ui]==='atual'||!_viewMode[ui]?' on':'')+'" data-v="atual" onclick="setView('+ui+',\'atual\')">📋 Visão Atual</button>';
  h+='<button class="vtab'+(_viewMode[ui]==='hist'?' on':'')+'" data-v="hist" onclick="setView('+ui+',\'hist\')">📅 Histórico de Avaliações</button>';
  h+='</div>';
  h+='<div id="view-wrap-'+ui+'">';
  h+=(_viewMode[ui]==='hist')?buildHistorico(u,ci):buildAtual(u,ui,ci);
  h+='</div>';
  return h;
}

function buildAtual(u,ui,ci){
  var cat=u.categorias&&u.categorias[ci];
  if(!cat) return '';
  var t=cat.totaisCategoria||{};
  var ok=t.ok||0,nok=t.nok||0,total=t.total||0;
  var abertas=t.acoes_abertas||0,atraso=t.acoes_atraso||0;
  var h='<div class="vals-grid">';
  h+=vc('Total itens',fmt(total),'');
  h+=vc('Conformes',fmt(ok),'color:var(--ok)');
  h+=vc('Não conformes',fmt(nok),'color:var(--n1)');
  h+=vc('Ações em atraso',fmt(atraso),'color:var(--n2)');
  h+='</div>';
  h+='<div class="chart-wrap">';
  h+='<div style="font-size:12px;font-weight:700;color:var(--ink-3);margin-bottom:12px">📊 Distribuição de itens — Categoria '+cat.categoria+'</div>';
  h+='<canvas id="chart-'+ui+'" style="max-height:180px"></canvas>';
  h+='<div class="chart-leg">';
  h+='<div class="leg-item"><div class="leg-dot" style="background:var(--ok)"></div>Conformes</div>';
  h+='<div class="leg-item"><div class="leg-dot" style="background:var(--n1)"></div>Não conformes</div>';
  h+='<div class="leg-item"><div class="leg-dot" style="background:var(--n2)"></div>Em atraso</div>';
  h+='</div></div>';
  return h;
}

function buildHistorico(u,ci){
  var cat=u.categorias&&u.categorias[ci];
  if(!cat||!cat.itens||cat.itens.length===0) return '<p style="color:var(--ink-4);font-size:13px">Sem histórico de itens.</p>';

  var itens=cat.itens;
  var hOK=itens.filter(function(it){return it.estado==='OK';}).length;
  var hNOK=itens.filter(function(it){return it.estado==='NOK';}).length;
  var hAtraso=itens.filter(function(it){return it.status_acao==='Em_Atraso';}).length;
  var hConc=itens.filter(function(it){return it.status_acao==='Concluida';}).length;

  var h='<div class="hist-stats">';
  h+=hsc('Total avaliações',itens.length,'var(--ink)');
  h+=hsc('Conformes',hOK,'var(--ok)');
  h+=hsc('Não conformes',hNOK,'var(--n1)');
  h+=hsc('Ações em atraso',hAtraso,'var(--n2)');
  h+='</div>';

  h+='<div class="hist-table-wrap">';
  h+='<table class="hist-table">';
  h+='<thead><tr>';
  h+='<th class="c">#</th>';
  h+='<th>Código</th>';
  h+='<th>Descrição</th>';
  h+='<th>Medida Corretiva</th>';
  h+='<th>Responsável</th>';
  h+='<th class="c">Estado</th>';
  h+='<th class="c">Prazo</th>';
  h+='<th class="c">Conclusão</th>';
  h+='<th class="c">Dias Atraso</th>';
  h+='<th class="c">Status Ação</th>';
  h+='</tr></thead>';
  h+='<tbody>';

  itens.forEach(function(item,idx){
    var sCls='s-na',sTxt='N/A';
    if(item.status_acao==='Concluida'){sCls='s-ok';sTxt='Concluída';}
    else if(item.status_acao==='Em_Atraso'){sCls='s-atraso';sTxt='Em Atraso';}
    else if(item.status_acao==='Em_Andamento'){sCls='s-andamento';sTxt='Em Andamento';}
    else if(item.status_acao==='N_Aplicavel'){sCls='s-na';sTxt='N/A';}

    var estCls=item.estado==='OK'?'est-ok':'est-nok';
    var estTxt=item.estado==='OK'?'Conforme':item.estado==='NOK'?'Não Conforme':(item.estado||'—');

    h+='<tr>';
    h+='<td class="td-idx">'+(idx+1)+'</td>';
    h+='<td class="td-code">'+(item.codigo_item||'—')+'</td>';
    h+='<td class="td-desc">'+(item.descricao||'—')+'</td>';
    h+='<td class="td-mc">'+(item.medida_corretiva||'—')+'</td>';
    h+='<td class="td-resp">'+(item.responsavel_acao||'—')+'</td>';
    h+='<td class="td-estado"><span class="est-badge '+estCls+'">'+estTxt+'</span></td>';
    h+='<td class="td-prazo">'+(item.prazo||'—')+'</td>';
    h+='<td class="td-conc">'+(item.data_conclusao?'✓ '+item.data_conclusao:'—')+'</td>';
    h+='<td class="td-atraso">'+(item.dias_atraso>0?item.dias_atraso+' dias':'—')+'</td>';
    h+='<td class="td-status"><span class="status-badge '+sCls+'">'+sTxt+'</span></td>';
    h+='</tr>';
  });

  h+='</tbody></table></div>';
  return h;
}

function vc(label,val,style){
  return '<div class="val-card"><div class="val-lbl">'+label+'</div><div class="val-num" style="'+style+'">'+val+'</div></div>';
}
function hsc(label,val,cor){
  return '<div class="hs-card"><div class="hs-lbl">'+label+'</div><div class="hs-val" style="color:'+cor+'">'+val+'</div></div>';
}

/* ── CHART ── */
function buildChart(u,ui,ci){
  var cat=u.categorias&&u.categorias[ci];
  if(!cat) return;
  var canvas=document.getElementById('chart-'+ui);
  if(!canvas) return;
  if(_charts['c-'+ui]){_charts['c-'+ui].destroy();delete _charts['c-'+ui];}
  var t=cat.totaisCategoria||{};
  var ok=t.ok||0,nok=t.nok||0,atraso=t.acoes_atraso||0,abertas=(t.acoes_abertas||0)-atraso;
  _charts['c-'+ui]=new Chart(canvas.getContext('2d'),{
    type:'bar',
    plugins:[ChartDataLabels],
    data:{
      labels:['Conformes','Não Conformes','Ações Abertas','Em Atraso'],
      datasets:[{
        data:[ok,nok,abertas>0?abertas:0,atraso],
        backgroundColor:['rgba(26,122,74,.8)','rgba(255,34,34,.75)','rgba(43,47,216,.7)','rgba(255,123,0,.8)'],
        borderRadius:5,borderWidth:0,barPercentage:.55,categoryPercentage:.7
      }]
    },
    options:{
      indexAxis:'y',responsive:true,maintainAspectRatio:true,
      layout:{padding:{right:50,top:4,bottom:4,left:4}},
      plugins:{
        legend:{display:false},
        datalabels:{anchor:'end',align:'end',formatter:function(v){return v;},font:{size:13,weight:'700',family:'DM Sans'},color:'#1a1a1a',offset:4},
        tooltip:{callbacks:{label:function(c){return ' '+c.parsed.x+' itens';}}}
      },
      scales:{
        x:{beginAtZero:true,ticks:{font:{size:11,weight:'600'},stepSize:1},grid:{color:'rgba(0,0,0,.05)'}},
        y:{ticks:{font:{size:12,weight:'700',family:'DM Sans'},color:'#1a1a1a'},grid:{display:false}}
      }
    }
  });
}
</script>
</body>
</html>
